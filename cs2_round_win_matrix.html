<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CS2 Round Win Probability</title>
<style>
  :root{
    --bg-deep:#0c0f11;
    --bg-panel:#14181b;
    --bg-panel-2:#191e21;
    --line:#262c2f;
    --line-soft:#1d2225;
    --text-hi:#eae7e0;
    --text-mid:#9aa1a5;
    --text-dim:#5f676b;
    --t-orange:#c9853b;
    --t-orange-soft:#8a5f30;
    --ct-blue:#4e7a9c;
    --ct-blue-soft:#3a5c74;
    --warn:#b3543f;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg-deep);color:var(--text-hi);
    font-family:'Segoe UI',ui-sans-serif,system-ui,-apple-system,Arial,sans-serif;}
  #app{max-width:1040px;margin:0 auto;padding:28px 20px 40px;}

  .eyebrow{
    font-size:11px; letter-spacing:.22em; text-transform:uppercase;
    color:var(--text-dim); font-weight:600; margin-bottom:4px;
  }
  h1{
    font-size:22px; margin:0 0 2px 0; font-weight:700; letter-spacing:.01em;
    color:var(--text-hi);
  }
  .subtitle{color:var(--text-mid); font-size:13px; margin-bottom:22px;}

  .maptabs{
    display:flex; flex-wrap:wrap; gap:6px; margin-bottom:16px;
    border-bottom:1px solid var(--line); padding-bottom:14px;
  }
  .maptab{
    background:var(--bg-panel); border:1px solid var(--line); color:var(--text-mid);
    font-size:12.5px; letter-spacing:.03em; padding:8px 14px; border-radius:3px;
    cursor:pointer; font-weight:600; text-transform:uppercase; transition:all .12s ease;
  }
  .maptab:hover{ border-color:#3a4145; color:var(--text-hi); }
  .maptab.active{
    background:linear-gradient(180deg, #232a2e, #1a1f22);
    border-color:#4a5359; color:var(--text-hi);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.03);
  }

  .controlrow{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:18px; flex-wrap:wrap; gap:12px;
  }

  .togglewrap{
    display:flex; align-items:center; gap:10px;
    background:var(--bg-panel); border:1px solid var(--line);
    border-radius:4px; padding:5px 6px;
  }
  .toggle-label{
    font-size:11.5px; letter-spacing:.08em; text-transform:uppercase;
    padding:6px 12px; border-radius:3px; cursor:pointer; font-weight:700;
    color:var(--text-dim); transition:all .15s ease; user-select:none;
  }
  .toggle-label.active-noplant{ background:var(--bg-panel-2); color:var(--text-hi); }
  .toggle-label.active-plant{ background:var(--warn); color:#fff0ea; }

  .legend{
    display:flex; align-items:center; gap:10px; font-size:11px; color:var(--text-dim);
  }
  .legend-bar{
    width:130px; height:8px; border-radius:2px;
    background:linear-gradient(90deg, var(--ct-blue) 0%, #4a4a48 50%, var(--t-orange) 100%);
  }

  .axislabel-top{
    font-size:10.5px; letter-spacing:.15em; text-transform:uppercase;
    color:var(--t-orange); font-weight:700; margin-bottom:6px;
  }
  .axislabel-side{
    font-size:10.5px; letter-spacing:.15em; text-transform:uppercase;
    color:var(--ct-blue); font-weight:700;
    writing-mode:vertical-rl; transform:rotate(180deg);
    display:flex; align-items:center; justify-content:center;
  }

  .gridwrap{ display:flex; gap:10px; }
  .rowlabels{ display:flex; flex-direction:column; }
  table.matrix{ border-collapse:separate; border-spacing:5px; }
  .colheadcell, .rowheadcell{
    text-align:center; font-size:13px; font-weight:700; color:var(--text-mid);
    width:100px; height:28px;
  }
  .cornercell{ width:44px; }
  .rowheadcell{ width:44px; }

  td.cell{
    width:100px; height:72px; border-radius:5px; position:relative;
    padding:0; vertical-align:middle; text-align:center;
    border:1px solid rgba(255,255,255,0.05);
  }
  td.cell.empty{ background:var(--bg-panel-2); border:1px dashed var(--line); }
  td.cell.lowconf{ border:1px dashed rgba(255,255,255,0.28); }

  .cell-inner{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    height:100%; width:100%;
  }
  .cell-pct{ font-size:17px; font-weight:800; letter-spacing:.01em; }
  .cell-n{ font-size:10px; margin-top:3px; opacity:.75; font-weight:600; letter-spacing:.02em; }
  .cell-flag{ position:absolute; top:4px; right:5px; font-size:9px; opacity:.6; }

  .footnote{
    margin-top:20px; font-size:11.5px; color:var(--text-dim); line-height:1.6;
    border-top:1px solid var(--line); padding-top:14px;
  }
  .footnote b{ color:var(--text-mid); }
  .swatch{ display:inline-block; width:9px; height:9px; border-radius:2px; margin-right:5px; vertical-align:middle; }
</style>
</head>
<body>
<div id="app">
  <div class="eyebrow">CS2 &middot; XvX Round Outcomes</div>
  <h1>Round Win Probability Matrix</h1>
  <div class="subtitle">T-side win probability by alive-player count, split by bomb status. Select a map below.</div>

  <div class="maptabs" id="maptabs"></div>

  <div class="controlrow">
    <div class="togglewrap" id="toggle">
      <div class="toggle-label active-noplant" data-mode="noplant" id="lbl-noplant">Not Planted</div>
      <div class="toggle-label" data-mode="plant" id="lbl-plant">Planted</div>
    </div>
    <div class="legend">
      <span><span class="swatch" style="background:var(--ct-blue)"></span>CT favored</span>
      <div class="legend-bar"></div>
      <span><span class="swatch" style="background:var(--t-orange)"></span>T favored</span>
    </div>
  </div>

  <div class="axislabel-top" style="margin-left:54px;">CT alive &rarr;</div>
  <div class="gridwrap">
    <div class="axislabel-side" style="width:16px;">T alive &rarr;</div>
    <table class="matrix" id="matrix"></table>
  </div>

  <div class="footnote" id="footnote"></div>
</div>

<script>
(function(){
  const maps = Object.keys(DATA);
  let currentMap = maps[0];
  let currentMode = 'noplant';
  const LOW_N = 15;

  const maptabs = document.getElementById('maptabs');
  maps.forEach(m=>{
    const b = document.createElement('div');
    b.className = 'maptab' + (m===currentMap?' active':'');
    b.textContent = m;
    b.onclick = ()=>{ currentMap = m; render(); };
    b.dataset.map = m;
    maptabs.appendChild(b);
  });

  document.getElementById('lbl-noplant').onclick = ()=>{ currentMode='noplant'; render(); };
  document.getElementById('lbl-plant').onclick = ()=>{ currentMode='plant'; render(); };

  function colorForPct(pct){
    // 0 -> CT blue, 50 -> neutral gray, 100 -> T orange
    const ct = [78,122,156];
    const mid = [58,58,56];
    const t = [201,133,59];
    let c1,c2,frac;
    if(pct<=50){ c1=ct; c2=mid; frac=pct/50; }
    else { c1=mid; c2=t; frac=(pct-50)/50; }
    const r = Math.round(c1[0]+(c2[0]-c1[0])*frac);
    const g = Math.round(c1[1]+(c2[1]-c1[1])*frac);
    const bl = Math.round(c1[2]+(c2[2]-c1[2])*frac);
    return `rgb(${r},${g},${bl})`;
  }

  function render(){
    document.querySelectorAll('.maptab').forEach(b=>{
      b.classList.toggle('active', b.dataset.map===currentMap);
    });
    document.getElementById('lbl-noplant').classList.toggle('active-noplant', currentMode==='noplant');
    document.getElementById('lbl-plant').classList.toggle('active-plant', currentMode==='plant');

    const grid = DATA[currentMap][currentMode];
    const table = document.getElementById('matrix');
    table.innerHTML = '';

    // header row
    const headRow = document.createElement('tr');
    headRow.appendChild(document.createElement('td')).className='cornercell';
    [5,4,3,2,1,0].forEach(ct=>{
      const th = document.createElement('td');
      th.className='colheadcell'; th.textContent = ct;
      headRow.appendChild(th);
    });
    table.appendChild(headRow);

    for(let i=0;i<6;i++){
      const tr = document.createElement('tr');
      const rh = document.createElement('td');
      rh.className='rowheadcell'; rh.textContent = 5-i;
      tr.appendChild(rh);
      for(let j=0;j<6;j++){
        const cellData = grid[i][j];
        const td = document.createElement('td');
        td.className='cell';
        if(cellData.pct===null || cellData.n===0){
          td.classList.add('empty');
          const inner = document.createElement('div');
          inner.className='cell-inner';
          inner.innerHTML = '<span style="color:var(--text-dim);font-size:11px;">no data</span>';
          td.appendChild(inner);
        } else {
          const isLow = cellData.n < LOW_N;
          td.style.background = colorForPct(cellData.pct);
          if(isLow){ td.classList.add('lowconf'); td.style.opacity = 0.55; }
          const inner = document.createElement('div');
          inner.className='cell-inner';
          const pctSpan = document.createElement('div');
          pctSpan.className='cell-pct';
          pctSpan.textContent = cellData.pct.toFixed(2)+'%';
          pctSpan.style.color = (cellData.pct>35 && cellData.pct<65) ? '#1a1a1a' : '#fff8f0';
          const nSpan = document.createElement('div');
          nSpan.className='cell-n';
          nSpan.textContent = 'n='+cellData.n;
          nSpan.style.color = (cellData.pct>35 && cellData.pct<65) ? '#1a1a1a' : '#fff8f0';
          inner.appendChild(pctSpan);
          inner.appendChild(nSpan);
          td.appendChild(inner);
          if(isLow){
            const flag = document.createElement('div');
            flag.className='cell-flag';
            flag.textContent = '\u26A0';
            flag.style.color = (cellData.pct>35 && cellData.pct<65) ? '#1a1a1a' : '#fff8f0';
            td.appendChild(flag);
          }
        }
        tr.appendChild(td);
      }
      table.appendChild(tr);
    }

    document.getElementById('footnote').innerHTML =
      `<b>Reading this:</b> cell value is T-side win probability for that alive-count combination on <b>${currentMap}</b>, ` +
      `${currentMode==='plant' ? 'after the bomb has been planted' : 'before the bomb is planted'}. ` +
      `<b>n</b> is the number of rounds observed. Cells with n &lt; ${LOW_N} are dashed and dimmed &mdash; ` +
      `treat those percentages as noisy, not signal. Cells marked "no data" had zero observed rounds in this state.`;
  }

  render();
})();
</script>
